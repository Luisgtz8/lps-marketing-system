<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Accesos al curso</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root { --amber:#F59E0B; --bg:#0a0a0a; --surface:#111; --mid:#0d0d0d; --text:#f0f0f0; --muted:#999; --border:#222; --green:#22c55e; --red:#ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; }
    .wrap { max-width: 820px; margin: 0 auto; padding: 40px 20px 80px; }
    h1 { font-family:'Space Grotesk',sans-serif; font-size:22px; margin:0 0 4px; }
    .sub { color:var(--muted); font-size:13px; margin:0 0 28px; }
    label { display:block; font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin:0 0 6px; }
    input { width:100%; background:var(--mid); border:1px solid var(--border); border-radius:8px; padding:11px 14px; font-size:15px; color:var(--text); box-sizing:border-box; }
    input:focus { outline:none; border-color:var(--amber); }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
    .row > div { flex:1; min-width:200px; }
    button { background:var(--amber); border:none; border-radius:8px; padding:11px 18px; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px; color:#000; cursor:pointer; }
    button.ghost { background:transparent; border:1px solid var(--border); color:var(--text); }
    button.danger { background:transparent; border:1px solid rgba(239,68,68,.4); color:var(--red); padding:7px 12px; font-size:12px; }
    button.ok { background:transparent; border:1px solid rgba(34,197,94,.4); color:var(--green); padding:7px 12px; font-size:12px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px; margin-bottom:24px; }
    .msg { font-size:13px; margin-top:12px; min-height:18px; }
    .msg.ok { color:var(--green); } .msg.err { color:var(--red); }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { text-align:left; padding:10px 8px; border-bottom:1px solid var(--border); vertical-align:middle; }
    th { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.06em; }
    .pill { font-size:11px; font-weight:700; padding:3px 9px; border-radius:99px; }
    .pill.paid { background:rgba(34,197,94,.12); color:var(--green); }
    .pill.unpaid { background:rgba(239,68,68,.12); color:var(--red); }
    .hidden { display:none; }
    a { color:var(--amber); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Accesos al curso</h1>
    <p class="sub">Activa el acceso después de que el cliente pague. Tu token se guarda solo en este navegador.</p>

    <!-- Token gate -->
    <div class="card" id="token-card">
      <label for="admin-token">Admin token</label>
      <div class="row">
        <div><input id="admin-token" type="password" placeholder="Pega tu ADMIN_TOKEN"></div>
        <button onclick="saveToken()">Entrar</button>
      </div>
      <div class="msg" id="token-msg"></div>
    </div>

    <!-- Grant -->
    <div class="card hidden" id="grant-card">
      <label for="grant-email">Activar / desactivar por correo</label>
      <div class="row">
        <div><input id="grant-email" type="email" placeholder="cliente@empresa.com"></div>
        <button onclick="doAction('grant')">Activar acceso</button>
        <button class="ghost" onclick="doAction('revoke')">Quitar</button>
      </div>
      <div class="msg" id="grant-msg"></div>
    </div>

    <!-- List -->
    <div class="card hidden" id="list-card">
      <div class="row" style="justify-content:space-between;margin-bottom:14px;">
        <strong>Registrados recientes</strong>
        <button class="ghost" onclick="loadUsers()">Actualizar</button>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead><tr><th>Correo</th><th>Nombre</th><th>Empresa</th><th>Estado</th><th></th></tr></thead>
          <tbody id="users-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    var API_BASE = 'https://api.lightningprosolutions.com';
    var TOKEN_KEY = 'lps-admin-token';

    function token() { return localStorage.getItem(TOKEN_KEY) || ''; }
    function headers() { return { 'Authorization': 'Bearer ' + token(), 'Content-Type': 'application/json' }; }

    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }

    async function saveToken() {
      var t = document.getElementById('admin-token').value.trim();
      var msg = document.getElementById('token-msg');
      if (!t) { msg.className = 'msg err'; msg.textContent = 'Escribe el token.'; return; }
      localStorage.setItem(TOKEN_KEY, t);
      // Validate by trying to load the list.
      var ok = await loadUsers(true);
      if (ok) { hide('token-card'); show('grant-card'); show('list-card'); }
      else { msg.className = 'msg err'; msg.textContent = 'Token inválido.'; }
    }

    async function doAction(action) {
      var email = document.getElementById('grant-email').value.trim().toLowerCase();
      var msg = document.getElementById('grant-msg');
      if (!email) { msg.className = 'msg err'; msg.textContent = 'Escribe un correo.'; return; }
      try {
        var res = await fetch(API_BASE + '/api/admin/access', {
          method: 'POST', headers: headers(),
          body: JSON.stringify({ email: email, action: action })
        });
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || res.status);
        msg.className = 'msg ok';
        msg.textContent = action === 'grant' ? '✓ Acceso activado para ' + email : '✓ Acceso retirado de ' + email;
        document.getElementById('grant-email').value = '';
        loadUsers();
      } catch (err) {
        msg.className = 'msg err';
        msg.textContent = err.message === 'user_not_found'
          ? 'Ese correo no se ha registrado todavía.'
          : 'Error: ' + err.message;
      }
    }

    async function loadUsers(silent) {
      try {
        var res = await fetch(API_BASE + '/api/admin/access', { headers: headers() });
        if (!res.ok) return false;
        var data = await res.json();
        var body = document.getElementById('users-body');
        body.innerHTML = '';
        (data.users || []).forEach(function(u) {
          var tr = document.createElement('tr');
          var paid = u.paid === true;
          var act = paid
            ? '<button class="danger" onclick="quick(\'' + u.email + '\',\'revoke\')">Quitar</button>'
            : '<button class="ok" onclick="quick(\'' + u.email + '\',\'grant\')">Activar</button>';
          tr.innerHTML =
            '<td>' + esc(u.email) + '</td>' +
            '<td>' + esc(u.nombre || '—') + '</td>' +
            '<td>' + esc(u.empresa || '—') + '</td>' +
            '<td><span class="pill ' + (paid ? 'paid">Activo' : 'unpaid">Pendiente') + '</span></td>' +
            '<td>' + act + '</td>';
          body.appendChild(tr);
        });
        return true;
      } catch (err) { return false; }
    }

    function quick(email, action) {
      document.getElementById('grant-email').value = email;
      doAction(action);
    }

    function esc(s) { return String(s).replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }

    // Auto-enter if a token is already saved.
    if (token()) { (async function(){ if (await loadUsers(true)) { hide('token-card'); show('grant-card'); show('list-card'); } })(); }
  </script>
</body>
</html>
